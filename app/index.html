    <script>
        sap.ui.getCore().attachInit(function () {
            sap.ushell.Container.createRenderer("fiori2", true).then(function (oRenderer) {
                oRenderer.placeAt("content");
            });
            // Create a MutationObserver to watch for changes in the DOM
            var observer = new MutationObserver(function (mutations) {
                mutations.forEach(function (mutation) {
                    if (mutation.addedNodes.length) {
                        var iconElement = document.getElementById("shell-header-icon");
                        if (iconElement) {
                            iconElement.src = "https://agrocappture-file.sfo3.cdn.digitaloceanspaces.com/LOGO%20oil.jpeg";
                        }
                    }
                });
            });
            observer.observe(document.body, { childList: true, subtree: true });

        });
    </script>
