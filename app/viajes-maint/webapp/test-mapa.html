<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Test Mapa Google</title>
  <style>
    #map { width: 100%; height: 400px; background: #f0f0f0; }
    body { font-family: Arial, sans-serif; padding: 20px; }
    pre { background: #eee; padding: 10px; overflow: auto; }
  </style>
</head>
<body>
  <h1>Test de carga de Google Maps</h1>
  <div id="log"></div>
  <div id="map"></div>

  <script>
    function log(msg) {
      var d = document.getElementById('log');
      d.innerHTML += '<p>' + msg + '</p>';
      console.log(msg);
    }

    log('Obteniendo API key...');
    fetch('/odata/v4/config/MapsApiKey()', { headers: { Accept: 'application/json' } })
      .then(function (res) { return res.json(); })
      .then(function (data) {
        var key = (data && data.value !== undefined ? data.value : data) || '';
        log('API key recibida: ' + (key ? key.substring(0, 10) + '...' : 'VACÍA'));
        if (!key) {
          log('ERROR: API key vacía');
          return;
        }
        var url = 'https://maps.googleapis.com/maps/api/js?key=' + encodeURIComponent(key) + '&loading=async&libraries=marker&callback=initMap';
        log('Cargando script: ' + url);
        var script = document.createElement('script');
        script.src = url;
        script.async = true;
        script.defer = true;
        script.onerror = function () { log('ERROR al cargar el script de Google Maps'); };
        document.head.appendChild(script);
      })
      .catch(function (err) {
        log('ERROR obteniendo API key: ' + err.message);
      });

    window.initMap = function () {
      log('Google Maps cargado. Creando mapa...');
      try {
        var map = new google.maps.Map(document.getElementById('map'), {
          center: { lat: 10.547027, lng: -71.636306 },
          zoom: 7,
          mapTypeId: 'roadmap'
        });
        new google.maps.marker.AdvancedMarkerElement({
          map: map,
          position: { lat: 10.547027, lng: -71.636306 },
          title: 'Maracaibo'
        });
        log('Mapa creado exitosamente');
      } catch (err) {
        log('ERROR creando mapa: ' + err.message);
      }
    };
  </script>
</body>
</html>
